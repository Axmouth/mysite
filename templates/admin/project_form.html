<section class="admin-shell">
  <a class="text-link" href="/admin">&larr; Admin</a>
  <h1>{{heading}}</h1>
  <form method="post" action="{{action}}" class="panel form-stack">
    <label>Title<input name="title" value="{{title}}" required></label>
    <label>Slug <span class="hint">(leave blank to generate from the title)</span><input name="slug" value="{{slug}}"></label>
    <label>Summary<textarea name="summary" rows="3">{{summary}}</textarea></label>
    <label>Cover image URL <span class="hint">(optional; copy one from the page image list)</span><input name="image_path" value="{{image_path}}"></label>
    <label>
      Body Markdown
      <textarea class="markdown-editor" data-image-upload="{{image_upload}}" name="body" rows="16">{{body}}</textarea>
    </label>
    {{upload_note}}
    <label class="switch">
      <input type="checkbox" name="published" {{published}}>
      <span class="switch-track" aria-hidden="true"></span>
      <span>Published</span>
    </label>
    <label class="switch">
      <input type="checkbox" name="featured" {{featured}}>
      <span class="switch-track" aria-hidden="true"></span>
      <span>Featured</span>
    </label>
    <button type="submit">Save project</button>
  </form>
  {{images}}
</section>
