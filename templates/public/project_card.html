<article class="project-card">
  <a href="/projects/{{slug}}" data-vt-img="{{slug}}" style="display: block;">{{image}}</a>
  <div>
    {{featured_label}}
    <h2><a href="/projects/{{slug}}" data-vt-title="{{slug}}">{{title}}</a></h2>
    <p>{{summary}}</p>
    <a class="text-link" href="/projects/{{slug}}">Read more <span aria-hidden="true">→</span></a>
  </div>
</article>
