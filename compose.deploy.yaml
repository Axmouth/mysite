services:
  site:
    image: ${SITE_IMAGE:?Set SITE_IMAGE}
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      SITE_URL: ${SITE_URL:?Set SITE_URL in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    expose:
      - "3000"
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.mysite.rule=Host(`${SITE_DOMAIN:?Set SITE_DOMAIN in .env}`) || Host(`www.${SITE_DOMAIN:?Set SITE_DOMAIN in .env}`)"
      - "traefik.http.routers.mysite.entrypoints=websecure"
      - "traefik.http.routers.mysite.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mysite.middlewares=mysite-compress"
      - "traefik.http.middlewares.mysite-compress.compress=true"
      - "traefik.http.services.mysite.loadbalancer.server.port=3000"
    volumes:
      - site-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  site-data:

networks:
  web:
    external: true
