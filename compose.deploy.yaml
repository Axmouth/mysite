services:
  site:
    image: ${SITE_IMAGE:?Set SITE_IMAGE}
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      SITE_URL: ${SITE_URL:?Set SITE_URL in .env}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    expose:
      - "3000"
    volumes:
      - site-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  caddy:
    image: caddy:2.11.3-alpine
    restart: unless-stopped
    depends_on:
      site:
        condition: service_healthy
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?Set SITE_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy:/etc/caddy:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  site-data:
  caddy-data:
  caddy-config:
